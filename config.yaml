# Configuration centrale du systeme RAG
# Toute valeur technique est ici - jamais codee en dur dans le code

embedding:
  model: "paraphrase-multilingual-MiniLM-L12-v2"  # ADR-003 : vrai multilingue FR/EN
  dimension: 384
  batch_size: 32
  cache_dir: ".cache_embeddings"

chunking:
  chunk_size: 500        # caracteres (ADR-005)
  chunk_overlap: 50

retrieval:
  top_k: 5
  score_threshold: 0.0

llm:
  provider: "groq"              # "groq" ou "ollama"
  groq_model: "llama-3.1-8b-instant"
  ollama_model: "mistral"
  ollama_url: "http://localhost:11434/api/generate"
  temperature: 0.2
  max_tokens: 700

stores:
  qdrant_url: "http://localhost:6333"
  qdrant_collection: "aws_sustainability"
  pgvector_dsn: "postgresql://postgres:password@localhost:5433/ragdb"
  default_backend: "qdrant"    # qdrant | faiss | pgvector

app:
  host: "0.0.0.0"
  port: 5000
  debug: false

benchmark:
  n_repetitions: 20
  n_questions: 10
